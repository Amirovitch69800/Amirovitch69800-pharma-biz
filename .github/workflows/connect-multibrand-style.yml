name: Connect multibrand pharmacy styles
on:
  issues:
    types: [opened]
permissions:
  contents: write
  issues: write
jobs:
  patch:
    if: contains(github.event.issue.title, 'Connect multibrand pharmacy styles')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Import multibrand stylesheet
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/PharmacyPortfolio.jsx')
          source = path.read_text()
          line = "import './pharmacy-multibrand.css';\n"
          if line not in source:
              source = source.replace("import './pharmacy-portfolio.css';\n", "import './pharmacy-portfolio.css';\n" + line)
          path.write_text(source)
          PY
      - name: Commit change
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/PharmacyPortfolio.jsx
          git commit -m "style: connect multibrand pharmacy stylesheet"
          git push
