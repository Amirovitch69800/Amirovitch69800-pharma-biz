name: Connect pharmacy portfolio

on:
  push:
    paths:
      - '.github/workflows/connect-pharmacy-portfolio.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Connect PharmacyPortfolio component
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/main.jsx')
          source = path.read_text()
          import_line = "import PharmacyPortfolio from './PharmacyPortfolio.jsx';\n"
          if import_line not in source:
              source = source.replace("import './styles.css';\n", "import './styles.css';\n" + import_line)

          old = "if (tab === 'pharmacies') return <Pharmacies state={state} reload={reload} />;"
          new = "if (tab === 'pharmacies') return <PharmacyPortfolio state={state} reload={reload} />;"
          if old not in source and new not in source:
              raise SystemExit('Pharmacy screen hook not found')
          source = source.replace(old, new)
          path.write_text(source)
          PY
      - name: Commit change
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/main.jsx
          git commit -m "feat: use operational pharmacy portfolio view"
          git push
